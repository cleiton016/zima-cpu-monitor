name: CI and Docker Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_NAMESPACE: cleiton016
  API_IMAGE_NAME: zima-cpu-monitor-api
  WEB_IMAGE_NAME: zima-cpu-monitor-web

jobs:
  validate:
    name: Validate tests and builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: PYTHONPATH=backend python -m pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate API Docker build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: local/zima-cpu-monitor-api:ci

      - name: Validate web Docker build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: local/zima-cpu-monitor-web:ci

  release:
    name: Version and publish Docker images
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Increment patch versions
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          current="$(tr -d '[:space:]' < backend/VERSION)"
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "backend/VERSION must contain a semantic version like 0.1.0" >&2
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"

          echo "$next" > backend/VERSION
          npm --prefix frontend version "$next" --no-git-tag-version

          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add backend/VERSION frontend/package.json frontend/package-lock.json
          git commit -m "chore: release ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:${{ steps.bump.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.bump.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:latest
